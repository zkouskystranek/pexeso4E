<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8" />
<title>Pexeso</title>
<script src="pairs.js"></script>
<style>
  body{
    font-family: Arial, system-ui;
    text-align:center;
    background:#eaf2fb;
  }

  /* ---------------------------- */
  /*   PROCVIČOVÁNÍ – ÚVODNÍ ČÁST */
  /* ---------------------------- */
  #learning{
    width: 560px;
    margin: 20px auto;
    padding: 20px;
    background:#fff;
    border-radius: 15px;
    box-shadow: 0 0 10px #0002;
    display: block; /* výchozí obrazovka */
  }
  #learning h2{ margin: 8px 0 12px; }

  #progress{
    font-size: 16px;
    color:#333;
    margin-bottom:10px;
  }

  #learn-img{
    width: 320px;
    height: 320px;
    object-fit: cover;
    border-radius: 12px;
    border: 3px solid #2672c3;
  }
  #learn-input{
    width: 80%;
    padding: 10px;
    font-size: 18px;
    margin-top: 15px;
    border-radius: 6px;
    border: 2px solid #aaa;
  }
  .btn-row{
    margin-top: 14px;
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }
  #learning button{
    padding: 10px 22px;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
  }
  #result{
    margin-top: 10px;
    font-size: 18px;
    font-weight: bold;
    min-height: 28px; /* stabilní rozložení */
  }

  /* ---------------------------- */
  /*       NASTAVENÍ PEXESA       */
  /* ---------------------------- */
  #setup{
    width: 560px;
    margin: 20px auto;
    padding: 20px;
    background:#fff;
    border-radius: 15px;
    box-shadow: 0 0 10px #0002;
    display: none;
  }
  #setup .row{ margin:8px 0; }
  #setup input[type="text"]{
    padding:8px 10px;
    border-radius:6px;
    border:1px solid #bbb;
    width: 220px;
    margin: 4px;
  }
  #setup select{
    padding:6px 10px;
    border-radius:6px;
    border:1px solid #bbb;
    font-size: 16px;
  }
  #setup .help{ color:#555; font-size:14px; }

  /* ---------------------------- */
  /*       HERNÍ ČÁST PEXESA      */
  /* ---------------------------- */
  #players{ font-size:18px; margin:10px; display:none; }
  #players .row{ display:flex; gap:14px; justify-content:center; align-items:center; flex-wrap:wrap; }
  #players .badge{
    padding:6px 10px;
    border-radius:20px;
    background:#f1f5fb;
    border:1px solid #d6e2f3;
    min-width:120px;
  }
  #players .badge.active{
    border-color:#1976d2;
    box-shadow:0 0 6px #1976d2;
    font-weight:700;
  }
  #turnInfo{ margin-top:6px; }
  #timerWrap{ display:none; margin-top:6px; font-weight:bold; }
  #timer{ font-variant-numeric: tabular-nums; }
  #learnStats{ margin-top:6px; color:#444; }


/* Mřížka pexesa 4 × 9 (9 sloupců, 4 řádky) */

#game{
  width: 540px;                 /* 9 × 100px + 8 × 10px = 980px */
  margin: 20px auto;
  display: none;                /* při startu hry to JS přepne na 'grid' */
  grid-template-columns: repeat(5, 100px);
  grid-auto-rows: 100px;        /* karty jsou 100 px vysoké → 4 řádky */
  gap: 10px;
}


  .card{
    width:100px;
    height:100px;
    perspective:600px;
    cursor:pointer;
    user-select:none;
    position:relative;
  }
  .card-inner{
    width:100%;
    height:100%;
    position:relative;
    transform-style:preserve-3d;
    transition:transform 0.6s;
  }
  .card.flipped .card-inner{ transform:rotateY(180deg); }

  .card-front,
  .card-back{
    position:absolute;
    width:100%;
    height:100%;
    backface-visibility:hidden;
    border-radius:10px;
  }
  .card-front{
    background:#3498db;
    border:2px solid #1e6fb6;
  }
  .card-back{
    transform:rotateY(180deg);
    background:white;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    border-radius:10px;
    box-sizing:border-box;
  }
  .back-content{
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .back-content img{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:8px;
  }
  .label{
    padding:4px;
    text-align:center;
    font-weight:700;
    font-size:15px;
    line-height:1.15;
    color:#333;
  }
  .card-number{
    position:absolute;
    bottom:4px;
    left:4px;
    width:20px;
    height:20px;
    border-radius:50%;
    background:#ffcc00;
    color:#000;
    font-size:12px;
    font-weight:bold;
    display:none;
    align-items:center;
    justify-content:center;
    box-shadow:0 0 4px #0003;
    pointer-events:none;
    z-index:5;
  }
  .card.flipped .card-number{ display:flex; }

  .matched{ opacity:0.6; cursor:default; }
  .matched1 .card-back{ border:4px solid #1976d2; box-shadow:0 0 10px #1976d2; }
  .matched2 .card-back{ border:4px solid #d32f2f; box-shadow:0 0 10px #d32f2f; }

  #winner{ font-size:24px; margin-top:15px; display:none; }

  /* utility */
  .btn{ padding:10px 18px; font-size:16px; border-radius:8px; cursor:pointer; }
  .btn-secondary{ background:#eef3fb; border:1px solid #cfdaf0; }
  .mt-10{ margin-top:10px; }
</style>
</head>

<body>
  <h1>🎮 Pexeso</h1>

  <!-- ----------------------------- -->
  <!--     PROCVIČOVACÍ SEKCE       -->
  <!-- ----------------------------- -->
  <div id="learning">
    <h2>Procvičování obrázků</h2>

    <div id="progress">Obrázek 1/18 • Úspěšnost: 0/18 (0%)</div>

    <img id="learn-img" src="" alt="procvičování">

    <div>
      <input id="learn-input" type="text" placeholder="Zapiš, co je na obrázku">
    </div>

    <div class="btn-row">
      <button class="btn" onclick="checkLearning()">Ověřit</button>
    </div>

    <div id="result"></div>

    <!-- navigační tlačítka – viditelné hned, logika zobrazení řeší JS -->
    <div class="btn-row">
      <button id="nextBtn" class="btn-secondary btn" onclick="nextLearning()">Další obrázek</button>
      <button id="prevBtn" class="btn-secondary btn" onclick="prevLearning()">Předchozí obrázek</button>
    </div>

    <div class="btn-row">
      <button id="startGameBtn" class="btn" onclick="openSetup()" style="display:none;">Spustit pexeso</button>
    </div>
  </div>

  <!-- ----------------------------- -->
  <!--     NASTAVENÍ PEXESA          -->
  <!-- ----------------------------- -->
  <div id="setup">
    <h2>Nastavení pexesa</h2>

    <div class="row">
      <label for="playersCount"><b>Počet hráčů:</b></label>
      <select id="playersCount" onchange="rebuildNameInputs()">
        <option value="1">1 (solo, čas 2:00)</option>
        <option value="2" selected>2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
      </select>
    </div>

    <div id="timerInfo" class="row help" style="display:none;">Režim jednoho hráče – po startu poběží časovač <b>2:00</b>.</div>

    <div class="row"><b>Jména hráčů (volitelné):</b></div>
    <div id="namesContainer" class="row"></div>

    <div class="btn-row">
      <button class="btn" onclick="startRealGameFromSetup()">Začít hru</button>
      <button class="btn btn-secondary" onclick="returnToLearning()">↩️ Zpět na poznávačku</button>
    </div>
  </div>

  <!-- ----------------------------- -->
  <!--     HERNÍ SEKCE PEXESA        -->
  <!-- ----------------------------- -->
  <button id="backToLearning" class="btn btn-secondary" onclick="returnToLearning()" style="display:none; margin-top:10px;">
    ↩️ Vrátit se na poznávačku
  </button>

  <div id="players">
    <div id="playersBadges" class="row"></div>
    <div id="turnInfo"></div>
    <div id="learnStats"></div>
    <div id="timerWrap">⏱️ Zbývá čas: <span id="timer">02:00</span></div>
  </div>

  <div id="game"></div>
  <button id="restartBtn" class="btn btn-secondary" onclick="restartSameSetup()" style="display:none;">Restartovat</button>
  <div id="winner"></div>

<script>
/* =========================
   DATASET z externího pairs.js
   ========================= */
let datasetPairs = (window.DATASET && Array.isArray(window.DATASET.items)) ? window.DATASET.items.slice() : [];
let drawCount    = (window.DATASET && Number.isInteger(window.DATASET.draw)) ? window.DATASET.draw : 18;

/* =========================
   STAV POZNÁVAČKY (všechny položky)
   ========================= */
let learnPairs   = [];   // kopie datasetu (všechny), zobrazuje se v náhodném pořadí
let learnOrder   = [];   // permutace indexů 0..learnPairs.length-1
let learnPos     = 0;    // pozice v poznávačce
let learnResults = [];   // true/false pro každý prvek learnPairs (dle learnOrder)

function shuffle(arr){
  for (let i = arr.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
function sampleN(arr, n){
  const idx = Array.from({length: arr.length}, (_,i)=>i);
  shuffle(idx);
  const take = Math.min(n, arr.length);
  const out = [];
  for (let k=0; k<take; k++) out.push(arr[idx[k]]);
  return out;
}
function makeRandomOrder(n){
  const a = Array.from({length:n}, (_,i)=>i);
  return shuffle(a);
}

function updateLearningProgress(){
  const correct = learnResults.filter(v => v === true).length;
  const total   = learnPairs.length;
  const pct     = Math.round((correct / total) * 100);
  document.getElementById("progress").textContent =
    `Obrázek ${learnPos+1}/${total} • Úspěšnost: ${correct}/${total} (${isNaN(pct)?0:pct}%)`;
}

function loadLearningImage() {
  const idx  = learnOrder[learnPos];
  const item = learnPairs[idx];

  document.getElementById("learn-img").src = item.file;
  document.getElementById("learn-input").value = "";
  document.getElementById("result").innerHTML  = "";

  // tlačítka
  const prevBtn  = document.getElementById("prevBtn");
  const nextBtn  = document.getElementById("nextBtn");
  const startBtn = document.getElementById("startGameBtn");

  prevBtn.style.display = (learnPos === 0) ? "none" : "inline-block";

  const isLast = (learnPos === learnOrder.length - 1);
  nextBtn.style.display  = isLast ? "none" : "inline-block";
  startBtn.style.display = isLast ? "inline-block" : "none";

  updateLearningProgress();
}

function checkLearning() {
  const idx = learnOrder[learnPos];
  const user = document.getElementById("learn-input").value.trim().toLowerCase();
  const correctStr = learnPairs[idx].name.toLowerCase();
  const res = document.getElementById("result");

  if (user === correctStr) {
    res.innerHTML = "✔️ <span style='color:green;'>Správně!</span>";
    learnResults[idx] = true;
  } else {
    res.innerHTML = "❌ <span style='color:red;'>Špatně</span><br>Správná odpověď: <b>" + learnPairs[idx].name + "</b>";
    learnResults[idx] = false;
  }
  updateLearningProgress();
}

function nextLearning() { if (learnPos < learnOrder.length - 1) { learnPos++; loadLearningImage(); } }
function prevLearning() { if (learnPos > 0)                     { learnPos--; loadLearningImage(); } }

/* Inicializace poznávačky */
function initLearning(){
  if (!datasetPairs.length){
    alert('Nebyla načtena žádná data. Zkontroluj prosím pairs.js.');
    return;
  }
  // poznávačka: projede VŠECHNY položky datasetu v náhodném pořadí
  learnPairs   = datasetPairs.slice();
  learnOrder   = makeRandomOrder(learnPairs.length);
  learnPos     = 0;
  learnResults = new Array(learnPairs.length).fill(null);

  // zobraz poznávačku, skryj hru
  document.getElementById("learning").style.display   = "block";
  document.getElementById("setup").style.display      = "none";
  document.getElementById("players").style.display    = "none";
  document.getElementById("game").style.display       = "none";
  document.getElementById("restartBtn").style.display = "none";
  document.getElementById("backToLearning").style.display = "none";

  loadLearningImage();
}

/* =========================
   NASTAVENÍ HRY
   ========================= */
function openSetup(){
  document.getElementById("learning").style.display = "none";
  document.getElementById("setup").style.display    = "block";
  onPlayersCountChanged();
}
function onPlayersCountChanged(){
  const count = parseInt(document.getElementById("playersCount").value, 10);
  document.getElementById("timerInfo").style.display = (count===1) ? "block" : "none";
}
function rebuildNameInputs(){
  const count = parseInt(document.getElementById("playersCount").value, 10);
  const wrap = document.getElementById("namesContainer");
  wrap.innerHTML = "";
  for(let i=1;i<=count;i++){
    const inp = document.createElement("input");
    inp.type = "text";
    inp.id = "name"+i;
    inp.placeholder = "Hráč " + i;
    wrap.appendChild(inp);
  }
  onPlayersCountChanged();
}

/* =========================
   PŘEPNUTÍ DO PEXESA
   ========================= */
function startRealGameFromSetup(){
  const countSel = document.getElementById("playersCount");
  const count = countSel ? parseInt(countSel.value, 10) : 2;

  const names = [];
  for(let i=1;i<=count;i++){
    const v = (document.getElementById("name"+i)?.value || "").trim();
    names.push(v || ("Hráč " + i));
  }

  // herní sada = náhodných 'drawCount' ze VŠECH obrázků
  gamePairs = sampleN(datasetPairs, drawCount);
  beginGame(count, names);
}

function returnToLearning() {
  clearGameTimer();
  document.getElementById("learning").style.display = "block";
  document.getElementById("setup").style.display    = "none";
  document.getElementById("players").style.display  = "none";
  document.getElementById("game").style.display     = "none";
  document.getElementById("restartBtn").style.display = "none";
  document.getElementById("backToLearning").style.display = "none";
  loadLearningImage();
}

/* =========================
   HRA PEXESO
   ========================= */
let deck = [];
let flippedCards = [];
let matchedPairs = 0;

// dynamické počty hráčů
let numPlayers   = 2;
let playerNames  = [];
let scores       = [];
let currentPlayer= 0;    // index 0..numPlayers-1
let soloMode     = false;

// časovač pro solo
let timerInterval= null;
let timeRemaining= 0;    // ms
let gameOver     = false;

function beginGame(count, names){
  // hráči
  numPlayers   = count;
  playerNames  = names.slice();
  scores       = new Array(numPlayers).fill(0);
  currentPlayer= 0;
  soloMode     = (numPlayers === 1);
  gameOver     = false;

  // UI
  document.getElementById("setup").style.display        = "none";
  document.getElementById("players").style.display      = "block";
  document.getElementById("game").style.display         = "grid";
  document.getElementById("restartBtn").style.display   = "inline-block";
  document.getElementById("backToLearning").style.display = "inline-block";

  // Úspěšnost z poznávačky (z learnPairs)
  const correct = learnResults.filter(v => v === true).length;
  const total   = learnPairs.length;
  const pct     = Math.round((correct/total)*100);
  document.getElementById("learnStats").textContent =
    `Úspěšnost v poznávačce: ${correct}/${total} (${isNaN(pct)?0:pct}%)`;

  // časovač pro solo
  if (soloMode){
    document.getElementById("timerWrap").style.display = "block";
    startGameTimer(2*60*1000); // 2:00
  } else {
    document.getElementById("timerWrap").style.display = "none";
    clearGameTimer();
  }

  renderPlayersBadges();
  renderTurnInfo();
  startGame();
}

function renderPlayersBadges(){
  const wrap = document.getElementById("playersBadges");
  wrap.innerHTML = "";
  for(let i=0;i<numPlayers;i++){
    const span = document.createElement("span");
    span.id = "badge-"+i;
    span.className = "badge" + (i===currentPlayer ? " active":"");
    span.textContent = `${playerNames[i]}: ${scores[i]}`;
    wrap.appendChild(span);
  }
}
function updateScoreBadge(i){
  const el = document.getElementById("badge-"+i);
  if (el) el.textContent = `${playerNames[i]}: ${scores[i]}`;
}
function renderTurnInfo(){
  const el = document.getElementById("turnInfo");
  el.textContent = soloMode
    ? "Režim: 1 hráč – získávej co nejvíc párů do vypršení času."
    : `Tah má: ${playerNames[currentPlayer]}`;

  // zvýraznění
  for(let i=0;i<numPlayers;i++){
    const b = document.getElementById("badge-"+i);
    if (!b) continue;
    if (i===currentPlayer) b.classList.add("active"); else b.classList.remove("active");
  }
}

function startGameTimer(ms){
  clearGameTimer();
  timeRemaining = ms;
  tickTimer(); // hned zobraz
  timerInterval = setInterval(()=>{
    timeRemaining -= 1000;
    if (timeRemaining <= 0){
      timeRemaining = 0;
      tickTimer();
      clearGameTimer();
      gameOver = true;
      endGame(true); // konec časem
    } else {
      tickTimer();
    }
  }, 1000);
}
function tickTimer(){
  const m = Math.floor(timeRemaining/60000);
  const s = Math.floor((timeRemaining%60000)/1000);
  document.getElementById("timer").textContent =
    `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
function clearGameTimer(){
  if (timerInterval){ clearInterval(timerInterval); timerInterval=null; }
}

function buildDeck(){
  const cards = [];
  gamePairs.forEach((p, idx) => {
    const id = "pair-" + (idx + 1);
    cards.push(
      { id, image: p.file, name: p.name },
      { id, image: p.file, name: p.name }
    );
  });
  return shuffle(cards);
}

function startGame(){
  const game = document.getElementById("game");
  game.innerHTML = "";

  flippedCards = [];
  matchedPairs = 0;

  // reset skóre
  scores = scores.map(()=>0);
  for(let i=0;i<numPlayers;i++) updateScoreBadge(i);

  deck = buildDeck();

  deck.forEach(cardData => {
    const card = document.createElement("div");
    card.classList.add("card");
    card.dataset.id    = cardData.id;
    card.dataset.image = cardData.image;
    card.dataset.name  = cardData.name;
    card.addEventListener("click", flipCard);

    const inner = document.createElement("div");
    inner.classList.add("card-inner");

    const front = document.createElement("div");
    front.classList.add("card-front");

    const back = document.createElement("div");
    back.classList.add("card-back");

    const backContent = document.createElement("div");
    backContent.classList.add("back-content");
    back.appendChild(backContent);

    const num = document.createElement("div");
    num.classList.add("card-number");
    num.textContent = cardData.id.replace("pair-", "");
    front.appendChild(num.cloneNode(true));
    back.appendChild(num);

    inner.appendChild(front);
    inner.appendChild(back);
    card.appendChild(inner);
    game.appendChild(card);
  });

  renderPlayersBadges();
  renderTurnInfo();
  document.getElementById("winner").style.display = "none";
  gameOver = false;

  if (soloMode){ startGameTimer(2*60*1000); }
}

/* Herní logika: 1. otočení = obrázek, 2. otočení = text */
function flipCard(){
  if (
    gameOver ||
    flippedCards.length === 2 ||
    this.classList.contains("matched") ||
    this.classList.contains("flipped")
  ) return;

  this.classList.add("flipped");
  flippedCards.push(this);

  const backContent = this.querySelector(".back-content");

  if (flippedCards.length === 1){
    // ✅ vlož skutečný <img>
    backContent.innerHTML = `<img src="${this.dataset.image}" alt="${this.dataset.name}">`;
  }

  if (flippedCards.length === 2){
    backContent.innerHTML = `<div class="label">${this.dataset.name}</div>`;
    setTimeout(checkMatch, 500);
  }
}

function checkMatch(){
  const [c1, c2] = flippedCards;
  const isMatch = c1.dataset.id === c2.dataset.id;

  if (isMatch){
    c1.classList.add("matched");
    c2.classList.add("matched");

    scores[currentPlayer]++;
    updateScoreBadge(currentPlayer);

    matchedPairs++;
    flippedCards = [];

    // konec hry: došly všechny páry v aktuální sadě
    if (matchedPairs === gamePairs.length){
      endGame(false);
      return;
    }

    // PO SHODĚ se hráč NEstřídá (klasické pexeso) → nic

  } else {
    setTimeout(() => {
      c1.classList.remove("flipped");
      c2.classList.remove("flipped");
      c1.querySelector(".back-content").innerHTML = "";
      c2.querySelector(".back-content").innerHTML = "";
      flippedCards = [];

      if (!soloMode) nextPlayer();  // po chybě se střídá (multi)
    }, 800);
  }
}

function nextPlayer(){
  currentPlayer = (currentPlayer + 1) % numPlayers;
  renderTurnInfo();
}

function endGame(timeUp){
  gameOver = true;
  clearGameTimer();

  const w = document.getElementById("winner");
  w.style.display = "block";

  if (soloMode){
    const pairsGot = scores[0];
    w.textContent = timeUp
      ? `⏱️ Čas vypršel. Získané páry: ${pairsGot}`
      : `🎉 Hotovo! Získané páry: ${pairsGot}`;
    return;
  }

  const maxScore = Math.max(...scores);
  const winners = scores
    .map((s,i)=>({s,i}))
    .filter(o=>o.s===maxScore)
    .map(o=>playerNames[o.i]);

  w.textContent = (winners.length === 1)
    ? `🏆 Vyhrál ${winners[0]}`
    : `🤝 Remíza: ${winners.join(" & ")}`;
}

/* Restart se stejným nastavením hráčů,
   ale s nově vylosovanou sadou pro hru. */
function restartSameSetup(){
  gamePairs = sampleN(datasetPairs, drawCount);
  startGame();
}

/* Start celé stránky */
window.onload = function() {
  // připrav poznávačku (všechny obrázky v náhodném pořadí)
  initLearning();

  // jistota: pexeso části skryté (initLearning je stejně nastaví)
  rebuildNameInputs();
};
</script>

</body>
</html>
